name: Deploy PWA to GitHub Pages

# Publishes web/ to GitHub Pages. Pages "Source" must be **GitHub Actions** (Settings -> Pages).
# `enablement: true` below sets that automatically for a repo where Pages is NOT yet enabled.
# Converting a site that was first enabled in "Deploy from a branch" mode is the one thing this
# workflow can't do for you: the Actions GITHUB_TOKEN is barred from changing the Pages source
# (that needs repo-admin), so flip it once by hand — or unpublish Pages and let this re-create it.
on:
  push:
    branches: ["main"]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deploy
        uses: actions/deploy-pages@v4
