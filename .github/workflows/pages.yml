name: Deploy PWA to GitHub Pages

# Publishes web/ to Pages. Self-enabling: the "Ensure Pages..." step flips Pages to the
# "GitHub Actions" build type itself, so no manual Settings -> Pages -> Source change is needed.
on:
  push:
    branches: ["main"]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Switch an existing branch-mode Pages site (or a brand-new one) to deploy from
      # GitHub Actions, so the web/ artifact below is what gets served — not a Jekyll
      # build of the repo root. configure-pages' `enablement` only fires when Pages is
      # *not* already enabled, so an explicit build_type=workflow PUT is what reliably
      # converts a site that was first enabled in "Deploy from a branch" mode.
      - name: Ensure Pages deploys from GitHub Actions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repo="${{ github.repository }}"
          curl -fsS -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$repo/pages" \
            -d '{"build_type":"workflow"}' \
          || curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$repo/pages" \
            -d '{"build_type":"workflow"}'
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deploy
        uses: actions/deploy-pages@v4
